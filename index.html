<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Y D G's First Website</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 700px;
      padding: 20px;
    }

    h1 {
      font-size: 52px;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }
<h1>TEST UPDATE 123</h1>
    p {
      font-size: 20px;
      color: #cbd5e1;
      margin-bottom: 30px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 25px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
      display: inline-block;
    }

    .primary {
      background: #3b82f6;
      color: white;
    }

    .primary:hover {
      background: #2563eb;
      transform: scale(1.05);
    }

    .secondary {
      background: transparent;
      border: 2px solid #3b82f6;
      color: #3b82f6;
    }

    .secondary:hover {
      background: #3b82f6;
      color: white;
      transform: scale(1.05);
    }
  </style>
</head>

<body>
  <div class="container">

    <h1>Y D G'S FIRST WEBSITE</h1>

    <p>This is my first modern website</p>

    <div class="buttons">
      <a href="#projects" class="btn primary">My Projects</a>
      <a href="#about" class="btn secondary">About Me</a>
    </div>

  </div>
</body>
</html>
